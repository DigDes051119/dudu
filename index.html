<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEADS — 3D Art Gallery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Unbounded:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            cursor: crosshair;
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(24px, 5vw, 64px);
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff, #06d6a0);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease infinite;
            text-align: center;
            pointer-events: none;
            text-shadow: none;
            letter-spacing: 0.1em;
        }

        .title span {
            display: block;
            font-size: clamp(10px, 1.5vw, 18px);
            font-weight: 400;
            letter-spacing: 0.5em;
            -webkit-text-fill-color: rgba(255,255,255,0.4);
            margin-top: 5px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sticker {
            position: fixed;
            z-index: 5;
            pointer-events: none;
            animation: floatSticker 6s ease-in-out infinite;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
            transition: transform 0.3s;
            user-select: none;
        }

        @keyframes floatSticker {
            0%, 100% { transform: translateY(0) rotate(var(--rot)); }
            50% { transform: translateY(-20px) rotate(calc(var(--rot) + 5deg)); }
        }

        .sticker:nth-child(odd) { animation-duration: 5s; }
        .sticker:nth-child(3n) { animation-duration: 7s; animation-delay: -2s; }

        .sticker svg { width: 100%; height: 100%; }

        .name-tag {
            position: fixed;
            z-index: 10;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: all;
        }

        .name-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 12px 28px;
            border-radius: 50px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
        }

        .name-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(131, 56, 236, 0.3);
        }

        .name-btn.active {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border-color: transparent;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.4);
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(720deg); opacity: 0; }
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(131,56,236,0.15), transparent 70%);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
        }

        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.8s, visibility 0.8s;
        }

        .loading.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-text {
            font-family: 'Unbounded', sans-serif;
            font-size: 24px;
            color: #8338ec;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .corner-badge {
            position: fixed;
            z-index: 10;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            pointer-events: none;
        }

        .corner-badge.tl { top: 30px; left: 30px; }
        .corner-badge.tr { top: 30px; right: 30px; }
        .corner-badge.bl { bottom: 30px; left: 30px; }

        .scan-line {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(131,56,236,0.5), transparent);
            z-index: 4;
            animation: scanMove 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% { top: -2px; }
            100% { top: 100vh; }
        }

        .info-panel {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .info-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .info-dot.active {
            background: #ff006e;
            box-shadow: 0 0 10px #ff006e;
            transform: scale(1.5);
        }

        .rotating-text {
            position: fixed;
            z-index: 5;
            pointer-events: none;
        }

        .rotating-text svg {
            animation: rotateText 15s linear infinite;
        }

        @keyframes rotateText {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bottom-line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8338ec, #ff006e, #3a86ff, transparent);
            z-index: 10;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .glitch-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 6;
            pointer-events: none;
            opacity: 0;
            mix-blend-mode: screen;
            animation: glitchFlash 8s ease-in-out infinite;
        }

        @keyframes glitchFlash {
            0%, 95%, 100% { opacity: 0; }
            96% { opacity: 0.05; background: #ff006e; transform: translate(2px, 0); }
            97% { opacity: 0.05; background: #3a86ff; transform: translate(-2px, 0); }
            98% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-text">LOADING HEADS...</div>
    </div>

    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="glitch-overlay"></div>
    <div class="scan-line"></div>

    <div class="title">
        HEADS
        <span>3D ART GALLERY</span>
    </div>

    <div class="corner-badge tl">3D SCANS</div>
    <div class="corner-badge tr">2026</div>
    <div class="corner-badge bl">INTERACTIVE</div>

    <div class="info-panel" id="infoPanel"></div>

    <div class="rotating-text" style="bottom: 120px; left: 50%; transform: translateX(-50%);">
        <svg width="120" height="120" viewBox="0 0 120 120">
            <defs>
                <path id="circlePath" d="M60,60 m-50,0 a50,50 0 1,1 100,0 a50,50 0 1,1 -100,0" />
            </defs>
            <text fill="rgba(255,255,255,0.15)" font-size="10" font-family="Space Grotesk" letter-spacing="4">
                <textPath href="#circlePath">DRAG TO ROTATE • SCROLL TO ZOOM • CLICK NAMES BELOW •</textPath>
            </text>
        </svg>
    </div>

    <div class="name-tag" id="nameTag">
        <button class="name-btn active" data-model="0">AIDAR</button>
        <button class="name-btn" data-model="1">DEN</button>
        <button class="name-btn" data-model="2">TILEK</button>
    </div>

    <div class="bottom-line"></div>

    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.03);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);

        const purpleLight = new THREE.PointLight(0x8338ec, 2, 10);
        purpleLight.position.set(-3, 2, 2);
        scene.add(purpleLight);

        const pinkLight = new THREE.PointLight(0xff006e, 1.5, 10);
        pinkLight.position.set(3, -1, 3);
        scene.add(pinkLight);

        const blueLight = new THREE.PointLight(0x3a86ff, 1, 8);
        blueLight.position.set(0, -3, 2);
        scene.add(blueLight);

        const rimLight = new THREE.DirectionalLight(0x06d6a0, 0.8);
        rimLight.position.set(-5, 0, -3);
        scene.add(rimLight);

        const models = [];
        const modelNames = ['Aidar', 'Den', 'Tilek'];
        const loader = new GLTFLoader();
        let currentModel = 0;
        let modelsLoaded = 0;

        function loadModel(name, index) {
            return new Promise((resolve) => {
                loader.load(`${name}.glb`, (gltf) => {
                    const model = gltf.scene;

                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.geometry.computeBoundingBox();
                            child.material.envMapIntensity = 1;
                            child.material.roughness = 0.3;
                            child.material.metalness = 0.1;
                        }
                    });

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 3 / maxDim;

                    model.scale.setScalar(scale);
                    model.position.set(
                        -center.x * scale,
                        -center.y * scale,
                        -center.z * scale
                    );
                    model.updateMatrixWorld(true);

                    const pivot = new THREE.Group();
                    pivot.add(model);
                    scene.add(pivot);
                    models[index] = pivot;
                    models[index].visible = index === 0;

                    modelsLoaded++;
                    if (modelsLoaded === 3) {
                        document.getElementById('loading').classList.add('hidden');
                    }
                    resolve(pivot);
                }, undefined, () => {
                    modelsLoaded++;
                    if (modelsLoaded === 3) {
                        document.getElementById('loading').classList.add('hidden');
                    }
                });
            });
        }

        await Promise.all([
            loadModel('Aidar', 0),
            loadModel('Den', 1),
            loadModel('Tilek', 2)
        ]);

        function switchModel(index) {
            if (index === currentModel) return;
            models[currentModel].visible = false;
            currentModel = index;
            models[currentModel].visible = true;

            document.querySelectorAll('.name-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });

            document.querySelectorAll('.info-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        document.querySelectorAll('.name-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
                switchModel(parseInt(btn.dataset.model));
            });
        });

        const infoPanel = document.getElementById('infoPanel');
        modelNames.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `info-dot ${i === 0 ? 'active' : ''}`;
            infoPanel.appendChild(dot);
        });

        function createStickerSVG(emoji, color) {
            return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="shadow">
                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
                    </filter>
                </defs>
                <g filter="url(#shadow)">
                    <circle cx="40" cy="40" r="35" fill="${color}" opacity="0.9"/>
                    <text x="40" y="48" text-anchor="middle" font-size="30">${emoji}</text>
                </g>
            </svg>`;
        }

        const stickerData = [
            { emoji: '🔥', color: '#ff006e', x: '8%', y: '25%', size: 60, rot: -15 },
            { emoji: '💀', color: '#8338ec', x: '85%', y: '30%', size: 55, rot: 20 },
            { emoji: '⚡', color: '#3a86ff', x: '10%', y: '65%', size: 50, rot: -8 },
            { emoji: '👽', color: '#06d6a0', x: '88%', y: '60%', size: 65, rot: 12 },
            { emoji: '🎯', color: '#ffbe0b', x: '5%', y: '45%', size: 45, rot: -25 },
            { emoji: '💫', color: '#fb5607', x: '90%', y: '45%', size: 48, rot: 30 },
            { emoji: '🌀', color: '#8338ec', x: '15%', y: '80%', size: 42, rot: -18 },
            { emoji: '✨', color: '#ff006e', x: '82%', y: '80%', size: 52, rot: 8 },
            { emoji: '🎭', color: '#3a86ff', x: '50%', y: '15%', size: 38, rot: -5 },
            { emoji: '🗿', color: '#06d6a0', x: '50%', y: '85%', size: 44, rot: 15 },
        ];

        stickerData.forEach((s) => {
            const div = document.createElement('div');
            div.className = 'sticker';
            div.style.cssText = `left:${s.x};top:${s.y};width:${s.size}px;height:${s.size}px;--rot:${s.rot}deg;`;
            div.innerHTML = createStickerSVG(s.emoji, s.color);
            document.body.appendChild(div);
        });

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 1;
            const colors = ['#ff006e', '#8338ec', '#3a86ff', '#06d6a0', '#ffbe0b'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const dx = (Math.random() - 0.5) * 200;
            const dy = (Math.random() - 0.5) * 200;
            const dur = Math.random() * 8 + 4;

            p.style.cssText = `
                left: ${x}vw; top: ${y}vh;
                width: ${size}px; height: ${size}px;
                background: ${color};
                --dx: ${dx}px; --dy: ${dy}px;
                animation-duration: ${dur}s;
                box-shadow: 0 0 ${size * 3}px ${color};
            `;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), dur * 1000);
        }

        setInterval(createParticle, 300);

        const cursorGlow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        let autoRotate = true;
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        let autoResumeTimer = null;

        const raycaster = new THREE.Raycaster();
        const mouseVec = new THREE.Vector2();
        let mouseDownX = 0;
        let mouseDownY = 0;

        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
            mouseDownX = e.clientX;
            mouseDownY = e.clientY;
            autoRotate = false;
            if (autoResumeTimer) clearTimeout(autoResumeTimer);
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging || !models[currentModel]) return;
            const deltaX = e.clientX - previousMouseX;
            const deltaY = e.clientY - previousMouseY;
            models[currentModel].rotation.y += deltaX * 0.01;
            models[currentModel].rotation.x += deltaY * 0.01;
            models[currentModel].rotation.x = Math.max(-0.5, Math.min(0.5, models[currentModel].rotation.x));
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        document.addEventListener('mouseup', (e) => {
            isDragging = false;
            autoResumeTimer = setTimeout(() => { autoRotate = true; }, 2000);

            const dx = e.clientX - mouseDownX;
            const dy = e.clientY - mouseDownY;
            if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
                mouseVec.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouseVec.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouseVec, camera);
                const intersects = raycaster.intersectObjects(models[currentModel].children, true);
                if (intersects.length > 0) {
                    const model = models[currentModel];
                    const origScale = model.scale.x;
                    let pulseTime = 0;
                    const pulseInterval = setInterval(() => {
                        pulseTime += 0.15;
                        const s = origScale + Math.sin(pulseTime * 6) * 0.08 * Math.max(0, 1 - pulseTime);
                        model.scale.setScalar(s);
                        if (pulseTime > 1) {
                            clearInterval(pulseInterval);
                            model.scale.setScalar(origScale);
                        }
                    }, 16);

                    purpleLight.intensity = 5;
                    setTimeout(() => { purpleLight.intensity = 2; }, 300);
                }
            }
        });

        renderer.domElement.style.cursor = 'grab';
        renderer.domElement.addEventListener('mousedown', () => {
            renderer.domElement.style.cursor = 'grabbing';
        });
        document.addEventListener('mouseup', () => {
            renderer.domElement.style.cursor = 'grab';
        });

        let autoRotateAngle = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            if (models[currentModel] && autoRotate && !isDragging) {
                models[currentModel].rotation.y += 0.008;
            }

            purpleLight.position.x = Math.sin(t * 0.7) * 4;
            purpleLight.position.z = Math.cos(t * 0.7) * 4;

            pinkLight.position.x = Math.cos(t * 0.5) * 3;
            pinkLight.position.y = Math.sin(t * 0.3) * 2;

            blueLight.position.x = Math.sin(t * 0.3 + 2) * 3;
            blueLight.position.z = Math.cos(t * 0.4) * 3;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === '1') switchModel(0);
            if (e.key === '2') switchModel(1);
            if (e.key === '3') switchModel(2);
        });

        let stickerAngle = 0;
        setInterval(() => {
            stickerAngle += 0.5;
            document.querySelectorAll('.sticker').forEach((s, i) => {
                const offset = i * (Math.PI * 2 / 10);
                const bobY = Math.sin((stickerAngle + offset * 57.3) * 0.02) * 5;
                const bobX = Math.cos((stickerAngle + offset * 57.3) * 0.015) * 3;
                s.style.transform = `translate(${bobX}px, ${bobY}px) rotate(${s.style.getPropertyValue('--rot')})`;
            });
        }, 50);
    </script>
</body>
</html>
